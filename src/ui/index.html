<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tracer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #282c34;
      color: #e0e0e0;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    #graph {
      flex: 1;
      height: 100vh;
      cursor: grab;
    }

    #graph:active { cursor: grabbing; }

    /* Panel */
    #panel {
      width: 280px;
      min-width: 0;
      height: 100vh;
      background: rgba(33,37,43,0.97);
      border-left: 1px solid #1d2026;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 10;
      transition: width 200ms ease;
    }

    #panel.collapsed { width: 0; border-left: none; }

    #panel.collapsed #panel-header,
    #panel.collapsed #panel-body {
      opacity: 0;
      pointer-events: none;
    }

    #panel-header {
      padding: 20px 16px 14px;
      border-bottom: 1px solid #1d2026;
      position: relative;
    }

    #panel-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #888;
      margin-bottom: 10px;
    }

    #panel-name {
      font-size: 15px;
      font-weight: 600;
      color: #888;
      word-break: break-all;
      line-height: 1.3;
      transition: color 0.2s;
    }

    #panel-meta {
      margin-top: 5px;
      font-size: 11px;
      color: #888;
    }

    #panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
      scrollbar-width: thin;
      scrollbar-color: #1d2026 transparent;
    }

    #panel-body::-webkit-scrollbar { width: 4px; }
    #panel-body::-webkit-scrollbar-thumb { background: #1d2026; border-radius: 2px; }

    #panel-empty {
      color: #555;
      font-size: 12px;
      line-height: 1.7;
      padding-top: 4px;
    }

    .section { margin-bottom: 18px; }

    .section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #888;
      margin-bottom: 7px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 8px;
      border-radius: 4px;
      background: #1d2026;
      border: 1px solid #2c313a;
      font-size: 11px;
      color: #aaa;
      margin: 0 3px 4px 0;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .chip:hover { border-color: #61afef; color: #e0e0e0; }
    .chip.active { border-color: #4b5263; background: #2c313a; border-left-width: 3px; }

    .chip-arrow {
      font-size: 10px;
      color: #555;
      margin-left: 2px;
      transition: color 0.15s;
    }

    .chip:hover .chip-arrow { color: #61afef; }

    .chip-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .source-box {
      padding: 8px 10px;
      background: #1d2026;
      border: 1px solid #2c313a;
      border-radius: 4px;
      font-size: 11px;
      color: #555;
      line-height: 1.6;
    }

    .source-box span { color: #888; }

    .hotspot-box {
      padding: 9px 10px;
      background: #120808;
      border: 1px solid #2a1010;
      border-radius: 4px;
      color: #ef4444;
      font-size: 11px;
      line-height: 1.6;
    }

    /* Panel collapse button */
    #panel-collapse-btn {
      position: absolute;
      top: 14px;
      right: 12px;
      width: 20px;
      height: 20px;
      background: transparent;
      border: none;
      cursor: pointer;
      color: #444;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      font-family: inherit;
    }

    #panel-collapse-btn:hover { color: #888; }

    /* Re-open tab */
    #panel-reopen-tab {
      display: none;
      position: fixed;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 24px;
      height: 48px;
      background: rgba(33,37,43,0.97);
      border-left: 1px solid #1d2026;
      border-radius: 4px 0 0 4px;
      align-items: center;
      justify-content: center;
      color: #444;
      cursor: pointer;
      font-size: 14px;
      z-index: 30;
    }

    #panel-reopen-tab:hover { color: #888; }
    #panel-reopen-tab.visible { display: flex; }

    /* Top bar */
    #topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 44px;
      background: rgba(33,37,43,0.92);
      border-bottom: 1px solid #1d2026;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 14px;
      z-index: 20;
      backdrop-filter: blur(8px);
      transition: right 200ms ease;
    }

    #topbar.panel-collapsed { right: 0; }

    #topbar-logo {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.15em;
    }

    #topbar-stats { font-size: 12px; color: #999; }

    #topbar-divider {
      width: 1px;
      height: 14px;
      background: #3e4451;
      flex-shrink: 0;
    }

    #topbar-labels-toggle {
      background: transparent;
      border: 1px solid #3e4451;
      border-radius: 3px;
      color: #666;
      font-size: 11px;
      font-family: inherit;
      padding: 3px 8px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    #topbar-labels-toggle:hover { border-color: #61afef; color: #aaa; }
    #topbar-labels-toggle.active { border-color: #61afef; color: #61afef; }

    /* Search */
    #topbar-search-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    #topbar-search {
      width: 200px;
      background: transparent;
      border: 1px solid #3e4451;
      border-radius: 3px;
      padding: 4px 24px 4px 10px;
      font-size: 12px;
      font-family: inherit;
      color: #aaa;
      outline: none;
    }

    #topbar-search::placeholder { color: #555; }
    #topbar-search:focus { border-color: #444; }

    #topbar-search-clear {
      position: absolute;
      right: 6px;
      background: none;
      border: none;
      color: #444;
      cursor: pointer;
      font-size: 13px;
      padding: 0;
      display: none;
      line-height: 1;
      font-family: inherit;
    }

    #topbar-search-clear:hover { color: #888; }
    #topbar-search-clear.visible { display: block; }

    #topbar-legend {
      display: flex;
      gap: 14px;
      margin-left: auto;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: #666;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    #labels-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 5;
    }

    .node-label {
      position: absolute;
      font-size: 10px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      white-space: nowrap;
      transform: translateX(-50%);
      text-shadow: 0 0 6px #282c34, 0 0 6px #282c34, 0 0 6px #282c34;
      pointer-events: none;
      display: none;
    }

    #loading {
      position: fixed;
      top: 50%;
      left: calc(50% - 140px);
      transform: translate(-50%, -50%);
      color: #999;
      font-size: 12px;
      letter-spacing: 0.1em;
    }

    #error-msg {
      position: fixed;
      top: 50%;
      left: calc(50% - 140px);
      transform: translate(-50%, -50%);
      color: #ef4444;
      font-size: 12px;
      text-align: center;
      line-height: 1.8;
      display: none;
    }
  </style>
</head>
<body>

  <div id="topbar">
    <span id="topbar-logo">TRACER</span>
    <span id="topbar-divider"></span>
    <span id="topbar-stats"></span>
    <div id="topbar-search-wrap">
      <input id="topbar-search" type="text" placeholder="search nodes..." autocomplete="off" spellcheck="false" />
      <button id="topbar-search-clear" title="Clear">×</button>
    </div>
    <button id="topbar-labels-toggle" title="Toggle persistent node labels">Labels</button>
    <div id="topbar-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#61afef"></div>Controller</div>
      <div class="legend-item"><div class="legend-dot" style="background:#98c379"></div>Service</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e5c07b"></div>Module</div>
      <div class="legend-item"><div class="legend-dot" style="background:#c678dd"></div>Model</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e06c75"></div>Hotspot</div>
    </div>
  </div>

  <div id="graph"></div>
  <div id="labels-overlay"></div>

  <div id="panel">
    <div id="panel-header">
      <button id="panel-collapse-btn" title="Collapse panel">&#8249;</button>
      <div id="panel-title">Node Inspector</div>
      <div id="panel-name">Click a node</div>
      <div id="panel-meta"></div>
    </div>
    <div id="panel-body">
      <div id="panel-empty">Rotate, zoom, and explore.<br><br>Click any node to inspect its connections and source location.</div>
    </div>
  </div>

  <div id="panel-reopen-tab" title="Open panel">&#8250;</div>

  <div id="loading">SCANNING ARCHITECTURE...</div>
  <div id="error-msg"></div>

  <script src="https://unpkg.com/3d-force-graph@1/dist/3d-force-graph.min.js"></script>
  <script>
    const KIND_COLOR = {
      controller: '#61afef',
      service:    '#98c379',
      module:     '#e5c07b',
      model:      '#c678dd',
    };

    const HOTSPOT_THRESHOLD = 4;

    let searchQuery = '';

    function nodeColor(node) {
      if (searchQuery && !node.name.toLowerCase().includes(searchQuery)) {
        return '#2d323b';
      }
      if (node.connectionCount >= HOTSPOT_THRESHOLD) return '#e06c75';
      return KIND_COLOR[node.kind] || '#888888';
    }

    function getLinkOpacitySuffix(link) {
      switch (link.label) {
        case 'declares':   return 'cc'; // ~80% — structural skeleton
        case 'calls':      return '77'; // ~47% — active runtime paths
        default:           return '33'; // ~20% — supporting / background
      }
    }

    function getLinkColor(link) {
      const nodes = currentGraphData ? currentGraphData.nodes : [];
      const src = nodes.find(n => n.id === link.sourceId);
      if (!src) return '#33333355';
      if (searchQuery) {
        const tgt = nodes.find(n => n.id === link.targetId);
        const srcDim = !src.name.toLowerCase().includes(searchQuery);
        const tgtDim = !tgt || !tgt.name.toLowerCase().includes(searchQuery);
        if (srcDim && tgtDim) return '#2d323b';
      }
      return nodeColor(src) + getLinkOpacitySuffix(link);
    }

    function getLinkWidth(link) {
      switch (link.label) {
        case 'declares': return 2.0;
        case 'calls':    return 1.2;
        default:         return 0.7;
      }
    }

    function nodeSize(node) {
      return Math.max(3, 3 + node.connectionCount * 1.5);
    }

    // Panel collapse
    const panel = document.getElementById('panel');
    const topbar = document.getElementById('topbar');
    const collapseBtn = document.getElementById('panel-collapse-btn');
    const reopenTab = document.getElementById('panel-reopen-tab');

    function setPanelCollapsed(collapsed) {
      if (collapsed) {
        panel.classList.add('collapsed');
        topbar.classList.add('panel-collapsed');
        collapseBtn.innerHTML = '&#8250;';
        reopenTab.classList.add('visible');
      } else {
        panel.classList.remove('collapsed');
        topbar.classList.remove('panel-collapsed');
        collapseBtn.innerHTML = '&#8249;';
        reopenTab.classList.remove('visible');
      }
      localStorage.setItem('tracer-panel-collapsed', collapsed ? '1' : '0');
    }

    collapseBtn.addEventListener('click', () => {
      setPanelCollapsed(!panel.classList.contains('collapsed'));
    });

    reopenTab.addEventListener('click', () => setPanelCollapsed(false));

    if (localStorage.getItem('tracer-panel-collapsed') === '1') {
      setPanelCollapsed(true);
    }

    // Search
    let fg = null;
    let currentGraphData = null;
    let activeChip = null;

    const searchInput = document.getElementById('topbar-search');
    const searchClear = document.getElementById('topbar-search-clear');

    function applySearch(query) {
      if (!fg || !currentGraphData) return;
      searchQuery = query.trim().toLowerCase();
      fg.nodeColor(nodeColor);
      fg.linkColor(getLinkColor);
    }

    searchInput.addEventListener('input', () => {
      const q = searchInput.value;
      searchClear.classList.toggle('visible', q.length > 0);
      applySearch(q);
    });

    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchClear.classList.remove('visible');
      applySearch('');
      searchInput.focus();
    });

    searchInput.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        searchInput.value = '';
        searchClear.classList.remove('visible');
        applySearch('');
        searchInput.blur();
      }
    });

    // Persistent node labels toggle
    let labelsVisible = localStorage.getItem('tracer-labels-visible') === 'true';
    const labelsToggle = document.getElementById('topbar-labels-toggle');
    const labelsOverlay = document.getElementById('labels-overlay');
    let labelEls = [];
    let labelRafId = null;

    function buildLabels() {
      labelsOverlay.innerHTML = '';
      labelEls = [];
      if (!currentGraphData) return;
      currentGraphData.nodes.forEach(node => {
        const el = document.createElement('div');
        el.className = 'node-label';
        el.textContent = node.name;
        el.style.color = '#e0e0e0';
        labelsOverlay.appendChild(el);
        labelEls.push({ el, node });
      });
    }

    function tickLabels() {
      if (!labelsVisible || !fg) return;
      const camera = fg.camera();
      const renderer = fg.renderer();
      const rect = renderer.domElement.getBoundingClientRect();
      const W = rect.width;
      const H = rect.height;
      const proj = camera.projectionMatrix.elements;
      const view = camera.matrixWorldInverse.elements;

      // Project all nodes to screen space
      const projected = labelEls.map(({ el, node }) => {
        const x = node.x || 0, y = node.y || 0, z = node.z || 0;
        const vx = view[0]*x + view[4]*y + view[8]*z + view[12];
        const vy = view[1]*x + view[5]*y + view[9]*z + view[13];
        const vz = view[2]*x + view[6]*y + view[10]*z + view[14];
        const vw = view[3]*x + view[7]*y + view[11]*z + view[15];
        const cx = proj[0]*vx + proj[4]*vy + proj[8]*vz + proj[12]*vw;
        const cy = proj[1]*vx + proj[5]*vy + proj[9]*vz + proj[13]*vw;
        const cw = proj[3]*vx + proj[7]*vy + proj[11]*vz + proj[15]*vw;
        const sx = rect.left + (cx/cw + 1) / 2 * W;
        const sy = rect.top  + (-cy/cw + 1) / 2 * H;
        return { el, node, sx, sy, visible: cw > 0 };
      });

      // Sort by priority: hotspots first, then by connectionCount descending
      projected.sort((a, b) => {
        const aHot = a.node.connectionCount >= HOTSPOT_THRESHOLD ? 1 : 0;
        const bHot = b.node.connectionCount >= HOTSPOT_THRESHOLD ? 1 : 0;
        if (aHot !== bHot) return bHot - aHot;
        return b.node.connectionCount - a.node.connectionCount;
      });

      // Place labels, skipping any that overlap an already-placed one
      const placed = [];
      const PAD = 4;
      projected.forEach(({ el, node, sx, sy, visible }) => {
        if (!visible || nodeColor(node) === '#2d323b') {
          el.style.display = 'none';
          return;
        }
        // Estimate label rect using char count (monospace ~6.5px per char at 10px)
        const w = node.name.length * 6.5 + 8;
        const h = 14;
        const r = { left: sx - w/2 - PAD, right: sx + w/2 + PAD, top: sy - h - PAD, bottom: sy + PAD };
        const overlaps = placed.some(p => !(r.right < p.left || r.left > p.right || r.bottom < p.top || r.top > p.bottom));
        if (overlaps) {
          el.style.display = 'none';
        } else {
          el.style.display = 'block';
          el.style.left = sx + 'px';
          el.style.top  = (sy - 14) + 'px';
          placed.push(r);
        }
      });

      labelRafId = requestAnimationFrame(tickLabels);
    }

    function applyLabels() {
      if (labelsVisible) {
        buildLabels();
        tickLabels();
      } else {
        if (labelRafId) { cancelAnimationFrame(labelRafId); labelRafId = null; }
        labelsOverlay.innerHTML = '';
        labelEls = [];
      }
      labelsToggle.classList.toggle('active', labelsVisible);
      localStorage.setItem('tracer-labels-visible', labelsVisible);
    }

    labelsToggle.addEventListener('click', () => {
      labelsVisible = !labelsVisible;
      applyLabels();
    });

    async function boot() {
      try {
        const res = await fetch('/api/graph');
        if (!res.ok) throw new Error('No graph found');
        const graph = await res.json();
        document.getElementById('loading').style.display = 'none';
        renderGraph(graph);
      } catch {
        document.getElementById('loading').style.display = 'none';
        const el = document.getElementById('error-msg');
        el.style.display = 'block';
        el.innerHTML = 'No graph found.<br>Run <strong>tracer scan</strong> first.';
      }
    }

    function renderGraph(graph) {
      document.getElementById('topbar-stats').textContent =
        `${graph.nodes.length} nodes  ·  ${graph.edges.length} edges`;

      const gData = {
        nodes: graph.nodes.map(n => ({ ...n })),
        links: graph.edges.map(e => ({
          ...e,
          source: e.sourceId,
          target: e.targetId,
        })),
      };

      currentGraphData = gData;

      const container = document.getElementById('graph');

      fg = ForceGraph3D()(container)
        .backgroundColor('#282c34')
        .graphData(gData)
        .nodeLabel(node => `${node.name} (${node.kind})`)
        .nodeColor(nodeColor)
        .nodeVal(nodeSize)
        .nodeOpacity(0.88)
        .nodeResolution(16)
        .linkColor(getLinkColor)
        .linkWidth(getLinkWidth)
        .linkOpacity(1)
        .linkDirectionalParticles(link => {
          const sourceNode = gData.nodes.find(n => n.id === link.sourceId);
          return sourceNode?.connectionCount >= HOTSPOT_THRESHOLD ? 4 : 2;
        })
        .linkDirectionalParticleColor(link => {
          const sourceNode = gData.nodes.find(n => n.id === link.sourceId);
          return nodeColor(sourceNode || {});
        })
        .linkDirectionalParticleWidth(0.8)
        .linkDirectionalParticleSpeed(0.004)
        .onNodeClick((node) => {
          clearActiveChip();
          navigateToNode(node, graph);
        })
        .onBackgroundClick(() => {
          clearActiveChip();
          resetPanel();
        });

      fg.d3Force('charge').strength(-400);
      fg.d3Force('link').distance(80);
      applyLabels();
    }

    function navigateToNode(node, graph) {
      showPanel(node, graph);
      const dist = 80;
      const distRatio = 1 + dist / Math.hypot(node.x || 1, node.y || 1, node.z || 1);
      fg.cameraPosition(
        { x: node.x * distRatio, y: node.y * distRatio, z: node.z * distRatio },
        node,
        800
      );
    }

    function clearActiveChip() {
      if (activeChip) {
        activeChip.classList.remove('active');
        activeChip.style.borderLeftColor = '';
        activeChip = null;
      }
    }

    function showPanel(node, graph) {
      document.getElementById('panel-empty').style.display = 'none';

      const nameEl = document.getElementById('panel-name');
      nameEl.textContent = node.name;
      nameEl.style.color = nodeColor(node);

      document.getElementById('panel-meta').textContent =
        `${node.kind}  ·  ${node.connectionCount} connection${node.connectionCount !== 1 ? 's' : ''}`;

      const body = document.getElementById('panel-body');
      body.innerHTML = '';

      const src = makeSection('Source');
      const box = document.createElement('div');
      box.className = 'source-box';
      box.innerHTML = `<span>${node.filePath.split(/[\\/]/).pop()}</span><br>Line ${node.line}`;
      box.title = node.filePath;
      src.appendChild(box);
      body.appendChild(src);

      const outEdges = graph.edges.filter(e => e.sourceId === node.id);
      if (outEdges.length) {
        const s = makeSection('Calls');
        for (const edge of outEdges) {
          const target = graph.nodes.find(n => n.id === edge.targetId);
          if (target) s.appendChild(makeChip(target, edge.label, graph));
        }
        body.appendChild(s);
      }

      const inEdges = graph.edges.filter(e => e.targetId === node.id);
      if (inEdges.length) {
        const s = makeSection('Called by');
        for (const edge of inEdges) {
          const source = graph.nodes.find(n => n.id === edge.sourceId);
          if (source) s.appendChild(makeChip(source, edge.label, graph));
        }
        body.appendChild(s);
      }

      if (node.connectionCount >= HOTSPOT_THRESHOLD) {
        const s = makeSection('Warning');
        const w = document.createElement('div');
        w.className = 'hotspot-box';
        w.textContent = `Hotspot — ${node.connectionCount} connections. Changes here have wide blast radius.`;
        s.appendChild(w);
        body.appendChild(s);
      }
    }

    function resetPanel() {
      const nameEl = document.getElementById('panel-name');
      nameEl.textContent = 'Click a node';
      nameEl.style.color = '#666';
      document.getElementById('panel-meta').textContent = '';
      document.getElementById('panel-body').innerHTML =
        '<div id="panel-empty" style="color:#555;font-size:12px;line-height:1.7;padding-top:4px">Rotate, zoom, and explore.<br><br>Click any node to inspect its connections and source location.</div>';
    }

    function makeSection(title) {
      const div = document.createElement('div');
      div.className = 'section';
      const label = document.createElement('div');
      label.className = 'section-label';
      label.textContent = title;
      div.appendChild(label);
      return div;
    }

    function makeChip(node, sublabel, graph) {
      const div = document.createElement('div');
      div.className = 'chip';
      const dot = document.createElement('div');
      dot.className = 'chip-dot';
      dot.style.background = nodeColor(node);
      div.appendChild(dot);
      const text = document.createElement('span');
      text.textContent = node.name;
      div.appendChild(text);
      const arrow = document.createElement('span');
      arrow.className = 'chip-arrow';
      arrow.textContent = '›';
      div.appendChild(arrow);
      div.title = `Navigate to ${node.name}`;

      div.addEventListener('click', () => {
        clearActiveChip();
        div.classList.add('active');
        div.style.borderLeftColor = nodeColor(node);
        activeChip = div;
        navigateToNode(node, graph);
      });

      return div;
    }
