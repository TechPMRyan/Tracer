<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tracer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #282c34;
      color: #e0e0e0;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    #graph {
      flex: 1;
      height: 100vh;
      cursor: grab;
    }

    #graph:active { cursor: grabbing; }

    /* Panel */
    #panel {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      width: 320px;
      background: rgba(33,37,43,0.97);
      border-left: 1px solid #1d2026;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 15;
      transform: translateX(0);
      transition: transform 250ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    #panel.collapsed { transform: translateX(320px); border-left: none; }

    #panel.collapsed #panel-header,
    #panel.collapsed #panel-body {
      opacity: 0;
      pointer-events: none;
    }

    #panel-header {
      padding: 20px 16px 14px;
      border-bottom: 1px solid #1d2026;
      position: relative;
    }

    #panel-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #9099a8;
      margin-bottom: 10px;
    }

    #panel-name {
      font-size: 15px;
      font-weight: 600;
      color: #9099a8;
      word-break: break-all;
      line-height: 1.3;
      transition: color 0.2s;
    }

    #panel-meta {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .kind-badge {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 2px 7px;
      border-radius: 3px;
      border: 1px solid currentColor;
      opacity: 0.85;
    }

    .conn-stat {
      font-size: 11px;
      color: #7a8299;
    }

    .conn-stat span {
      color: #aaa;
    }

    .chip-label {
      font-size: 10px;
      color: #7a8299;
      margin-left: 2px;
    }

    #panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
      scrollbar-width: thin;
      scrollbar-color: #1d2026 transparent;
    }

    #panel-body::-webkit-scrollbar { width: 4px; }
    #panel-body::-webkit-scrollbar-thumb { background: #1d2026; border-radius: 2px; }

    #panel-empty {
      color: #7a8299;
      font-size: 12px;
      line-height: 1.7;
      padding-top: 4px;
    }

    .section { margin-bottom: 18px; }

    .section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #9099a8;
      margin-bottom: 7px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 8px;
      border-radius: 4px;
      background: #1d2026;
      border: 1px solid #2c313a;
      font-size: 11px;
      color: #aaa;
      margin: 0 3px 4px 0;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      max-width: 100%;
      overflow: hidden;
    }

    .chip > span:not(.chip-arrow) {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    .chip:hover { border-color: #61afef; color: #e0e0e0; }
    .chip.active { border-color: #4b5263; background: #2c313a; border-left-width: 3px; }

    .chip-arrow {
      font-size: 10px;
      color: #7a8299;
      margin-left: 2px;
      transition: color 0.15s;
    }

    .chip:hover .chip-arrow { color: #61afef; }

    .chip-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .source-box {
      padding: 8px 10px;
      background: #1d2026;
      border: 1px solid #2c313a;
      border-radius: 4px;
      font-size: 11px;
      color: #7a8299;
      line-height: 1.6;
      overflow-wrap: break-word;
      word-break: break-all;
    }

    .source-box span { color: #9099a8; }

    .hotspot-box {
      padding: 9px 10px;
      background: #120808;
      border: 1px solid #2a1010;
      border-radius: 4px;
      color: #ef4444;
      font-size: 11px;
      line-height: 1.6;
    }

    /* Routes */
    .route-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      border-bottom: 1px solid #1d2026;
      font-size: 11px;
    }

    .route-row:last-child { border-bottom: none; }

    .route-method {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      min-width: 42px;
      text-align: center;
      padding: 2px 5px;
      border-radius: 3px;
    }

    .route-method.GET    { color: #98c379; background: rgba(152,195,121,0.1); }
    .route-method.POST   { color: #61afef; background: rgba(97,175,239,0.1); }
    .route-method.PUT    { color: #e5c07b; background: rgba(229,192,123,0.1); }
    .route-method.PATCH  { color: #e5c07b; background: rgba(229,192,123,0.1); }
    .route-method.DELETE { color: #e06c75; background: rgba(224,108,117,0.1); }

    .route-path {
      color: #abb2bf;
      font-size: 11px;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Idle panel state */
    .idle-header {
      font-size: 12px;
      color: #7a8299;
      line-height: 1.7;
      margin-bottom: 14px;
    }

    .idle-counts {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
    }

    .idle-count-pill {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 3px;
      border: 1px solid #2c313a;
      color: #7a8299;
    }

    .idle-count-pill span { color: #aaa; }

    .idle-hotspot-hint {
      font-size: 11px;
      color: #7a8299;
      line-height: 1.6;
      margin-bottom: 10px;
    }

    .idle-hotspot-hint strong { color: #e06c75; font-weight: normal; }

    /* Panel collapse button */
    #panel-collapse-btn {
      position: absolute;
      top: 12px;
      right: 10px;
      width: 28px;
      height: 28px;
      background: transparent;
      border: none;
      cursor: pointer;
      color: #7a8299;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      font-family: inherit;
    }

    #panel-collapse-btn:hover { color: #aaa; }

    /* Re-open tab */
    #panel-reopen-tab {
      display: none;
      position: fixed;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 24px;
      height: 48px;
      background: rgba(33,37,43,0.97);
      border-left: 1px solid #1d2026;
      border-radius: 4px 0 0 4px;
      align-items: center;
      justify-content: center;
      color: #666;
      cursor: pointer;
      font-size: 14px;
      z-index: 30;
    }

    #panel-reopen-tab:hover { color: #9099a8; }
    #panel-reopen-tab.visible { display: flex; }

    /* Top bar */
    #topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 320px;
      height: 44px;
      background: rgba(33,37,43,0.92);
      border-bottom: 1px solid #1d2026;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 14px;
      z-index: 20;
      backdrop-filter: blur(8px);
      transition: right 250ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    #topbar.panel-collapsed { right: 0; }

    #topbar-logo {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.15em;
    }

    #topbar-stats { font-size: 12px; color: #999; }

    #topbar-divider {
      width: 1px;
      height: 14px;
      background: #3e4451;
      flex-shrink: 0;
    }

    #topbar-labels-toggle {
      background: transparent;
      border: 1px solid #3e4451;
      border-radius: 3px;
      color: #7a8299;
      font-size: 11px;
      font-family: inherit;
      padding: 3px 8px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    #topbar-labels-toggle:hover { border-color: #61afef; color: #aaa; }
    #topbar-labels-toggle.active { border-color: #61afef; color: #61afef; }

    /* Search */
    #topbar-search-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    #topbar-search {
      width: 240px;
      background: transparent;
      border: 1px solid #3e4451;
      border-radius: 3px;
      padding: 4px 24px 4px 10px;
      font-size: 12px;
      font-family: inherit;
      color: #aaa;
      outline: none;
      transition: width 0.2s ease, border-color 0.15s;
    }

    #topbar-search::placeholder { color: #7a8299; }
    #topbar-search:focus { border-color: #61afef; }

    #topbar-search-clear {
      position: absolute;
      right: 6px;
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 13px;
      padding: 0;
      display: none;
      line-height: 1;
      font-family: inherit;
    }

    #topbar-search-clear:hover { color: #9099a8; }
    #topbar-search-clear.visible { display: block; }

    #topbar-legend {
      display: flex;
      gap: 14px;
      margin-left: auto;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: #7a8299;
      cursor: pointer;
      user-select: none;
      transition: opacity 0.15s, color 0.15s;
    }

    .legend-item:hover { color: #aaa; }
    .legend-item.dimmed { opacity: 0.25; }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    /* Loading */
    @keyframes ellipsis {
      0%   { content: '';   }
      33%  { content: '.';  }
      66%  { content: '..'; }
      100% { content: '...'; }
    }

    #loading::after {
      content: '';
      animation: ellipsis 1.2s steps(1) infinite;
    }

    @keyframes panelContentIn {
      from { opacity: 0; transform: translateX(12px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .panel-content-in {
      animation: panelContentIn 0.2s ease forwards;
    }

    #labels-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 5;
    }

    .node-label {
      position: absolute;
      font-size: 10px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      white-space: nowrap;
      transform: translateX(-50%);
      text-shadow: 0 0 6px #282c34, 0 0 6px #282c34, 0 0 6px #282c34;
      pointer-events: none;
      display: none;
    }

    #loading {
      position: fixed;
      top: 50%;
      left: calc((100vw - var(--panel-w, 320px)) / 2);
      transform: translate(-50%, -50%);
      color: #999;
      font-size: 12px;
      letter-spacing: 0.1em;
    }

    #error-msg {
      position: fixed;
      top: 50%;
      left: calc((100vw - var(--panel-w, 320px)) / 2);
      transform: translate(-50%, -50%);
      color: #f87171;
      font-size: 12px;
      text-align: center;
      line-height: 1.8;
      display: none;
    }

    #search-no-results {
      position: fixed;
      top: 50%;
      left: calc((100vw - var(--panel-w, 320px)) / 2);
      transform: translate(-50%, -50%);
      color: #7a8299;
      font-size: 12px;
      text-align: center;
      letter-spacing: 0.05em;
      pointer-events: none;
      display: none;
    }

    #search-no-results span {
      color: #9099a8;
    }

    /* Responsiveness */
    @media (max-width: 900px) {
      #topbar-legend { display: none; }
    }

    @media (max-width: 700px) {
      #panel {
        width: 100vw;
        top: auto;
        height: 50vh;
        border-left: none;
        border-top: 1px solid #1d2026;
        transform: translateY(0);
      }

      #panel.collapsed { transform: translateY(100vh); }

      #topbar {
        right: 0;
      }

      #topbar-stats { display: none; }

      #topbar-search { width: 160px; }

      #panel-reopen-tab {
        right: 50%;
        top: auto;
        bottom: 0;
        transform: translateX(50%) rotate(90deg);
        width: 48px;
        height: 24px;
        border-radius: 4px 4px 0 0;
        border-left: none;
        border-top: 1px solid #1d2026;
      }
    }
  </style>
</head>
<body>

  <div id="topbar">
    <span id="topbar-logo">TRACER</span>
    <span id="topbar-divider"></span>
    <span id="topbar-stats"></span>
    <div id="topbar-search-wrap">
      <input id="topbar-search" type="text" placeholder="search nodes..." autocomplete="off" spellcheck="false" />
      <button id="topbar-search-clear" title="Clear">×</button>
    </div>
    <button id="topbar-labels-toggle" title="Toggle persistent node labels">Labels</button>
    <div id="topbar-legend">
      <div class="legend-item" data-kind="controller"><div class="legend-dot" style="background:#61afef"></div>Controller</div>
      <div class="legend-item" data-kind="service"><div class="legend-dot" style="background:#98c379"></div>Service</div>
      <div class="legend-item" data-kind="module"><div class="legend-dot" style="background:#e5c07b"></div>Module</div>
      <div class="legend-item" data-kind="model"><div class="legend-dot" style="background:#c678dd"></div>Model</div>
      <div class="legend-item" style="cursor:default"><div class="legend-dot" style="background:#e06c75"></div>Hotspot</div>
    </div>
  </div>

  <div id="graph"></div>
  <div id="labels-overlay"></div>

  <div id="panel">
    <div id="panel-header">
      <button id="panel-collapse-btn" title="Collapse panel">&#8250;</button>
      <div id="panel-title">Node Inspector</div>
      <div id="panel-name">Click a node</div>
      <div id="panel-meta"></div>
    </div>
    <div id="panel-body">
      <div id="panel-empty">Click any node to inspect its routes, dependencies, and connections.</div>
    </div>
  </div>

  <div id="panel-reopen-tab" title="Open panel">&#8249;</div>

  <div id="loading">SCANNING ARCHITECTURE</div>
  <div id="error-msg"></div>
  <div id="search-no-results"></div>

  <script src="/3d-force-graph.min.js"></script>
  <script>
    const KIND_COLOR = {
      controller: '#61afef',
      service:    '#98c379',
      module:     '#e5c07b',
      model:      '#c678dd',
    };

    const HOTSPOT_THRESHOLD = 4;

    let searchQuery = '';
    let selectedNodeId = null;
    let connectedNodeIds = new Set();
    let currentGraph = null;

    // Kind visibility filters — all on by default
    const activeKindFilters = new Set(['controller', 'service', 'module', 'model']);

    function lightenHex(hex, amt) {
      const h = hex.replace('#', '');
      const r = Math.min(255, parseInt(h.slice(0, 2), 16) + amt);
      const g = Math.min(255, parseInt(h.slice(2, 4), 16) + amt);
      const b = Math.min(255, parseInt(h.slice(4, 6), 16) + amt);
      return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
    }

    function nodeColor(node) {
      // Kind filter
      if (!activeKindFilters.has(node.kind)) return '#2d323b';

      const base = node.connectionCount >= HOTSPOT_THRESHOLD ? '#e06c75' : (KIND_COLOR[node.kind] || '#888888');
      if (selectedNodeId) {
        if (node.id === selectedNodeId) return lightenHex(base, 55);
        if (!connectedNodeIds.has(node.id)) return '#2d323b';
      }
      if (searchQuery && !node.name.toLowerCase().includes(searchQuery)) {
        return '#2d323b';
      }
      return base;
    }

    function getLinkOpacitySuffix(link) {
      switch (link.label) {
        case 'declares':   return 'cc';
        case 'calls':      return '77';
        default:           return '33';
      }
    }

    function getLinkColor(link) {
      const nodes = currentGraphData ? currentGraphData.nodes : [];
      const src = nodes.find(n => n.id === link.sourceId);
      const tgt = nodes.find(n => n.id === link.targetId);

      // Dim links where either endpoint is filtered out
      if (src && !activeKindFilters.has(src.kind)) return '#2d323b';
      if (tgt && !activeKindFilters.has(tgt.kind)) return '#2d323b';

      if (!src) return '#33333355';
      if (selectedNodeId) {
        const srcIsSelected = link.sourceId === selectedNodeId || link.targetId === selectedNodeId;
        const srcIsConnected = connectedNodeIds.has(link.sourceId) || connectedNodeIds.has(link.targetId);
        if (!srcIsSelected && !srcIsConnected) return '#2d323b';
      }
      if (searchQuery) {
        const srcDim = !src.name.toLowerCase().includes(searchQuery);
        const tgtDim = !tgt || !tgt.name.toLowerCase().includes(searchQuery);
        if (srcDim && tgtDim) return '#2d323b';
      }
      return nodeColor(src) + getLinkOpacitySuffix(link);
    }

    function getLinkWidth(link) {
      switch (link.label) {
        case 'declares': return 2.0;
        case 'calls':    return 1.2;
        default:         return 0.7;
      }
    }

    function nodeSize(node) {
      const base = Math.max(3, 3 + node.connectionCount * 1.5);
      return node.id === selectedNodeId ? base * 1.8 : base;
    }

    // Panel collapse
    const panel = document.getElementById('panel');
    const topbar = document.getElementById('topbar');
    const collapseBtn = document.getElementById('panel-collapse-btn');
    const reopenTab = document.getElementById('panel-reopen-tab');

    function setPanelCollapsed(collapsed) {
      if (collapsed) {
        panel.classList.add('collapsed');
        topbar.classList.add('panel-collapsed');
        collapseBtn.innerHTML = '&#8249;';
        reopenTab.classList.add('visible');
        document.documentElement.style.setProperty('--panel-w', '0px');
      } else {
        panel.classList.remove('collapsed');
        topbar.classList.remove('panel-collapsed');
        collapseBtn.innerHTML = '&#8250;';
        reopenTab.classList.remove('visible');
        document.documentElement.style.setProperty('--panel-w', '320px');
      }
      localStorage.setItem('tracer-panel-collapsed', collapsed ? '1' : '0');
    }

    collapseBtn.addEventListener('click', () => {
      setPanelCollapsed(!panel.classList.contains('collapsed'));
    });

    reopenTab.addEventListener('click', () => setPanelCollapsed(false));

    // Initialize panel-w CSS variable before first render
    document.documentElement.style.setProperty('--panel-w', '320px');

    if (localStorage.getItem('tracer-panel-collapsed') === '1') {
      setPanelCollapsed(true);
    }

    // Search
    let fg = null;
    let currentGraphData = null;
    let activeChip = null;

    const searchInput = document.getElementById('topbar-search');
    const searchClear = document.getElementById('topbar-search-clear');

    const noResultsEl = document.getElementById('search-no-results');

    function applySearch(query) {
      if (!fg || !currentGraphData) return;
      searchQuery = query.trim().toLowerCase();
      fg.nodeColor(nodeColor);
      fg.linkColor(getLinkColor);

      if (searchQuery) {
        const matchCount = currentGraphData.nodes.filter(
          n => n.name.toLowerCase().includes(searchQuery)
        ).length;
        if (matchCount === 0) {
          noResultsEl.textContent = '';
          const prefix = document.createTextNode('No results for \u201c');
          const term = document.createElement('span');
          term.textContent = searchQuery;
          const suffix = document.createTextNode('\u201d');
          noResultsEl.append(prefix, term, suffix);
          noResultsEl.style.display = 'block';
        } else {
          noResultsEl.style.display = 'none';
        }
      } else {
        noResultsEl.style.display = 'none';
      }
    }

    searchInput.addEventListener('input', () => {
      const q = searchInput.value;
      searchClear.classList.toggle('visible', q.length > 0);
      applySearch(q);
    });

    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchClear.classList.remove('visible');
      applySearch('');
      searchInput.focus();
    });

    searchInput.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        searchInput.value = '';
        searchClear.classList.remove('visible');
        applySearch('');
        searchInput.blur();
      }
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
      const tag = document.activeElement.tagName;
      const isTyping = tag === 'INPUT' || tag === 'TEXTAREA';

      // / → focus search
      if (e.key === '/' && !isTyping) {
        e.preventDefault();
        searchInput.focus();
        searchInput.select();
      }

      // [ → toggle panel
      if (e.key === '[' && !isTyping) {
        setPanelCollapsed(!panel.classList.contains('collapsed'));
      }

      // Escape → deselect node (when not in search)
      if (e.key === 'Escape' && !isTyping && selectedNodeId) {
        clearActiveChip();
        resetPanel();
        selectedNodeId = null;
        connectedNodeIds = new Set();
        if (fg) {
          fg.nodeColor(nodeColor);
          fg.nodeVal(nodeSize);
          fg.linkColor(getLinkColor);
        }
      }
    });

    // Legend kind filters
    document.querySelectorAll('.legend-item[data-kind]').forEach(item => {
      item.addEventListener('click', () => {
        const kind = item.dataset.kind;
        if (activeKindFilters.has(kind)) {
          // Don't allow filtering out all kinds
          if (activeKindFilters.size === 1) return;
          activeKindFilters.delete(kind);
          item.classList.add('dimmed');
        } else {
          activeKindFilters.add(kind);
          item.classList.remove('dimmed');
        }
        if (fg) {
          fg.nodeColor(nodeColor);
          fg.linkColor(getLinkColor);
        }
      });
    });

    // Persistent node labels toggle — on by default
    const storedLabels = localStorage.getItem('tracer-labels-visible');
    let labelsVisible = storedLabels === null ? true : storedLabels === 'true';
    const labelsToggle = document.getElementById('topbar-labels-toggle');
    const labelsOverlay = document.getElementById('labels-overlay');
    let labelEls = [];
    let labelRafId = null;

    function buildLabels() {
      labelsOverlay.innerHTML = '';
      labelEls = [];
      if (!currentGraphData) return;
      currentGraphData.nodes.forEach(node => {
        const el = document.createElement('div');
        el.className = 'node-label';
        el.textContent = node.name;
        el.style.color = '#e0e0e0';
        labelsOverlay.appendChild(el);
        labelEls.push({ el, node });
      });
    }

    function tickLabels() {
      if (!labelsVisible || !fg) return;
      const camera = fg.camera();
      const renderer = fg.renderer();
      const rect = renderer.domElement.getBoundingClientRect();
      const W = rect.width;
      const H = rect.height;
      const proj = camera.projectionMatrix.elements;
      const view = camera.matrixWorldInverse.elements;

      const projected = labelEls.map(({ el, node }) => {
        const x = node.x || 0, y = node.y || 0, z = node.z || 0;
        const vx = view[0]*x + view[4]*y + view[8]*z + view[12];
        const vy = view[1]*x + view[5]*y + view[9]*z + view[13];
        const vz = view[2]*x + view[6]*y + view[10]*z + view[14];
        const vw = view[3]*x + view[7]*y + view[11]*z + view[15];
        const cx = proj[0]*vx + proj[4]*vy + proj[8]*vz + proj[12]*vw;
        const cy = proj[1]*vx + proj[5]*vy + proj[9]*vz + proj[13]*vw;
        const cw = proj[3]*vx + proj[7]*vy + proj[11]*vz + proj[15]*vw;
        const sx = rect.left + (cx/cw + 1) / 2 * W;
        const sy = rect.top  + (-cy/cw + 1) / 2 * H;
        return { el, node, sx, sy, visible: cw > 0 };
      });

      projected.sort((a, b) => {
        const aHot = a.node.connectionCount >= HOTSPOT_THRESHOLD ? 1 : 0;
        const bHot = b.node.connectionCount >= HOTSPOT_THRESHOLD ? 1 : 0;
        if (aHot !== bHot) return bHot - aHot;
        return b.node.connectionCount - a.node.connectionCount;
      });

      const placed = [];
      const PAD = 4;
      projected.forEach(({ el, node, sx, sy, visible }) => {
        if (!visible || nodeColor(node) === '#2d323b') {
          el.style.display = 'none';
          return;
        }
        const w = node.name.length * 6.5 + 8;
        const h = 14;
        const r = { left: sx - w/2 - PAD, right: sx + w/2 + PAD, top: sy - h - PAD, bottom: sy + PAD };
        const overlaps = placed.some(p => !(r.right < p.left || r.left > p.right || r.bottom < p.top || r.top > p.bottom));
        if (overlaps) {
          el.style.display = 'none';
        } else {
          el.style.display = 'block';
          el.style.left = sx + 'px';
          el.style.top  = (sy - 14) + 'px';
          placed.push(r);
        }
      });

      labelRafId = requestAnimationFrame(tickLabels);
    }

    function applyLabels() {
      if (labelsVisible) {
        buildLabels();
        tickLabels();
      } else {
        if (labelRafId) { cancelAnimationFrame(labelRafId); labelRafId = null; }
        labelsOverlay.innerHTML = '';
        labelEls = [];
      }
      labelsToggle.classList.toggle('active', labelsVisible);
      localStorage.setItem('tracer-labels-visible', labelsVisible);
    }

    labelsToggle.addEventListener('click', () => {
      labelsVisible = !labelsVisible;
      applyLabels();
    });

    async function boot() {
      try {
        const res = await fetch('/api/graph');
        if (!res.ok) throw new Error('No graph found');
        const graph = await res.json();
        document.getElementById('loading').style.display = 'none';
        renderGraph(graph);
      } catch {
        document.getElementById('loading').style.display = 'none';
        const el = document.getElementById('error-msg');
        el.style.display = 'block';
        el.innerHTML = 'No graph found.<br>Run <strong>tracer scan</strong> first.';
      }
    }

    function renderGraph(graph) {
      currentGraph = graph;

      document.getElementById('topbar-stats').textContent =
        `${graph.nodes.length} nodes  ·  ${graph.edges.length} edges`;

      const gData = {
        nodes: graph.nodes.map(n => ({ ...n })),
        links: graph.edges.map(e => ({
          ...e,
          source: e.sourceId,
          target: e.targetId,
        })),
      };

      currentGraphData = gData;

      const container = document.getElementById('graph');

      fg = ForceGraph3D()(container)
        .backgroundColor('#282c34')
        .graphData(gData)
        .nodeLabel(node => `${node.name} (${node.kind})`)
        .nodeColor(nodeColor)
        .nodeVal(nodeSize)
        .nodeOpacity(0.88)
        .nodeResolution(16)
        .linkColor(getLinkColor)
        .linkWidth(getLinkWidth)
        .linkOpacity(1)
        .linkDirectionalParticles(link => {
          const sourceNode = gData.nodes.find(n => n.id === link.sourceId);
          return sourceNode?.connectionCount >= HOTSPOT_THRESHOLD ? 4 : 2;
        })
        .linkDirectionalParticleColor(link => {
          const sourceNode = gData.nodes.find(n => n.id === link.sourceId);
          return nodeColor(sourceNode || {});
        })
        .linkDirectionalParticleWidth(0.8)
        .linkDirectionalParticleSpeed(0.004)
        .onNodeClick((node) => {
          clearActiveChip();
          navigateToNode(node, graph);
        })
        .onBackgroundClick(() => {
          clearActiveChip();
          resetPanel();
          selectedNodeId = null;
          connectedNodeIds = new Set();
          fg.nodeColor(nodeColor);
          fg.nodeVal(nodeSize);
          fg.linkColor(getLinkColor);
        });

      fg.d3Force('charge').strength(-400);
      fg.d3Force('link').distance(80);

      fg.width(container.clientWidth).height(container.clientHeight);

      // Populate idle panel state now that we have graph data
      resetPanel();

      applyLabels();
    }

    function navigateToNode(node, graph) {
      selectedNodeId = node.id;
      connectedNodeIds = new Set();
      graph.edges.forEach(e => {
        if (e.sourceId === node.id) connectedNodeIds.add(e.targetId);
        if (e.targetId === node.id) connectedNodeIds.add(e.sourceId);
      });
      fg.nodeColor(nodeColor);
      fg.nodeVal(nodeSize);
      fg.linkColor(getLinkColor);

      setPanelCollapsed(false);
      showPanel(node, graph);
      const nx = node.x || 0, ny = node.y || 0, nz = node.z || 0;
      const cam = fg.camera();
      const dx = cam.position.x - nx;
      const dy = cam.position.y - ny;
      const dz = cam.position.z - nz;
      const len = Math.hypot(dx, dy, dz) || 1;
      const dist = 90;
      fg.cameraPosition(
        { x: nx + (dx / len) * dist, y: ny + (dy / len) * dist, z: nz + (dz / len) * dist },
        { x: nx, y: ny, z: nz },
        800
      );
    }

    function clearActiveChip() {
      if (activeChip) {
        activeChip.classList.remove('active');
        activeChip.style.borderLeftColor = '';
        activeChip = null;
      }
    }

    function showPanel(node, graph) {
      document.getElementById('panel-title').textContent = 'Node Inspector';
      const nameEl = document.getElementById('panel-name');
      nameEl.textContent = node.name;
      nameEl.style.color = nodeColor(node);

      // Kind badge + connection direction counts
      const meta = document.getElementById('panel-meta');
      meta.innerHTML = '';
      const badge = document.createElement('span');
      badge.className = 'kind-badge';
      badge.textContent = node.kind;
      badge.style.color = nodeColor(node);
      meta.appendChild(badge);

      const outEdges = graph.edges.filter(e => e.sourceId === node.id);
      const inEdges  = graph.edges.filter(e => e.targetId === node.id);
      const stat = document.createElement('span');
      stat.className = 'conn-stat';
      const outCount = document.createElement('span');
      outCount.textContent = String(outEdges.length);
      const inCount = document.createElement('span');
      inCount.textContent = String(inEdges.length);
      stat.append('calls ', outCount, '\u00a0\u00a0·\u00a0\u00a0called by ', inCount);
      meta.appendChild(stat);

      const body = document.getElementById('panel-body');
      body.innerHTML = '';
      body.classList.remove('panel-content-in');
      void body.offsetWidth;
      body.classList.add('panel-content-in');
      setTimeout(() => body.classList.remove('panel-content-in'), 200);

      // 1. Hotspot warning — first if applicable
      if (node.connectionCount >= HOTSPOT_THRESHOLD) {
        const s = makeSection('Hotspot');
        const w = document.createElement('div');
        w.className = 'hotspot-box';
        w.textContent = `${node.connectionCount} connections. Changes here have wide blast radius.`;
        s.appendChild(w);
        body.appendChild(s);
      }

      // 2. Routes — controllers only (requires routes on GraphNode)
      if (node.kind === 'controller' && node.routes && node.routes.length) {
        const s = makeSection(`Routes (${node.routes.length})`);
        for (const route of node.routes) {
          const row = document.createElement('div');
          row.className = 'route-row';
          const method = document.createElement('span');
          method.className = `route-method ${route.method}`;
          method.textContent = route.method;
          const routePath = document.createElement('span');
          routePath.className = 'route-path';
          routePath.textContent = route.path;
          row.appendChild(method);
          row.appendChild(routePath);
          s.appendChild(row);
        }
        body.appendChild(s);
      }

      // 3. Outgoing connections
      if (outEdges.length) {
        const s = makeSection(`Calls (${outEdges.length})`);
        for (const edge of outEdges) {
          const target = graph.nodes.find(n => n.id === edge.targetId);
          if (target) {
            const wrap = document.createElement('div');
            wrap.style.display = 'flex';
            wrap.style.alignItems = 'center';
            wrap.style.marginBottom = '2px';
            wrap.appendChild(makeChip(target, edge.label, graph));
            const lbl = document.createElement('span');
            lbl.className = 'chip-label';
            lbl.textContent = edge.label;
            wrap.appendChild(lbl);
            s.appendChild(wrap);
          }
        }
        body.appendChild(s);
      }

      // 4. Incoming connections
      if (inEdges.length) {
        const s = makeSection(`Called by (${inEdges.length})`);
        for (const edge of inEdges) {
          const source = graph.nodes.find(n => n.id === edge.sourceId);
          if (source && edge.label !== 'declares') {
            const wrap = document.createElement('div');
            wrap.style.display = 'flex';
            wrap.style.alignItems = 'center';
            wrap.style.marginBottom = '2px';
            wrap.appendChild(makeChip(source, edge.label, graph));
            const lbl = document.createElement('span');
            lbl.className = 'chip-label';
            lbl.textContent = edge.label;
            wrap.appendChild(lbl);
            s.appendChild(wrap);
          }
        }
        body.appendChild(s);
      }

      // 5. Declaring module
      const declaredBy = graph.edges.find(e => e.targetId === node.id && e.label === 'declares');
      if (declaredBy) {
        const mod = graph.nodes.find(n => n.id === declaredBy.sourceId);
        if (mod) {
          const s = makeSection('Module');
          const chip = makeChip(mod, declaredBy.label, graph);
          s.appendChild(chip);
          body.appendChild(s);
        }
      }

      // 6. Source location
      const src = makeSection('Source');
      const box = document.createElement('div');
      box.className = 'source-box';
      const fileName = node.filePath.split(/[\\/]/).pop();
      const relPath = node.filePath.replace(/\\/g, '/').split('/src/').pop() || fileName;
      const fileSpan = document.createElement('span');
      fileSpan.textContent = fileName;
      const lineText = document.createTextNode(`  line ${node.line}`);
      const br = document.createElement('br');
      const pathSpan = document.createElement('span');
      pathSpan.style.cssText = 'font-size:10px;color:#444';
      pathSpan.textContent = relPath;
      box.append(fileSpan, lineText, br, pathSpan);
      box.title = node.filePath;
      src.appendChild(box);
      body.appendChild(src);
    }

    function resetPanel() {
      document.getElementById('panel-title').textContent = '';
      const nameEl = document.getElementById('panel-name');
      nameEl.textContent = 'Click a node';
      nameEl.style.color = '#666';
      document.getElementById('panel-meta').textContent = '';

      const body = document.getElementById('panel-body');

      // If graph is loaded, show a useful idle state
      if (currentGraph) {
        const hotspots = currentGraph.nodes.filter(n => n.connectionCount >= HOTSPOT_THRESHOLD);
        const counts = { controller: 0, service: 0, module: 0, model: 0 };
        currentGraph.nodes.forEach(n => { if (counts[n.kind] !== undefined) counts[n.kind]++; });

        body.innerHTML = '';

        const hint = document.createElement('div');
        hint.className = 'idle-header';
        hint.textContent = 'Select any node to explore its connections.';
        body.appendChild(hint);

        // Node type counts
        const pills = document.createElement('div');
        pills.className = 'idle-counts';
        [
          ['controller', '#61afef'],
          ['service',    '#98c379'],
          ['module',     '#e5c07b'],
          ['model',      '#c678dd'],
        ].forEach(([kind, color]) => {
          if (!counts[kind]) return;
          const pill = document.createElement('div');
          pill.className = 'idle-count-pill';
          pill.style.borderColor = color + '44';
          const countSpan = document.createElement('span');
          countSpan.style.color = color;
          countSpan.textContent = String(counts[kind]);
          pill.append(countSpan, ` ${kind}s`);
          pills.appendChild(pill);
        });
        body.appendChild(pills);

        // Hotspot guidance
        if (hotspots.length) {
          const hotspotHint = document.createElement('div');
          hotspotHint.className = 'idle-hotspot-hint';
          const strong = document.createElement('strong');
          strong.textContent = `${hotspots.length} hotspot${hotspots.length > 1 ? 's' : ''}`;
          hotspotHint.append(strong, ' detected \u2014 nodes with the most connections and widest blast radius. Start here.');
          body.appendChild(hotspotHint);

          // Top hotspot chips
          const sorted = [...hotspots].sort((a, b) => b.connectionCount - a.connectionCount).slice(0, 5);
          const s = makeSection('Hotspots');
          sorted.forEach(node => {
            s.appendChild(makeChip(node, '', currentGraph));
          });
          body.appendChild(s);
        }
      } else {
        body.innerHTML = '<div id="panel-empty" style="color:#555;font-size:12px;line-height:1.7;padding-top:4px">Select a node to inspect it.</div>';
      }
    }

    function makeSection(title) {
      const div = document.createElement('div');
      div.className = 'section';
      const label = document.createElement('div');
      label.className = 'section-label';
      label.textContent = title;
      div.appendChild(label);
      return div;
    }

    function makeChip(node, sublabel, graph) {
      const div = document.createElement('div');
      div.className = 'chip';
      const dot = document.createElement('div');
      dot.className = 'chip-dot';
      dot.style.background = nodeColor(node);
      div.appendChild(dot);
      const text = document.createElement('span');
      text.textContent = node.name;
      div.appendChild(text);
      const arrow = document.createElement('span');
      arrow.className = 'chip-arrow';
      arrow.textContent = '›';
      div.appendChild(arrow);
      div.title = `Navigate to ${node.name}`;

      div.addEventListener('click', () => {
        clearActiveChip();
        div.classList.add('active');
        div.style.borderLeftColor = nodeColor(node);
        activeChip = div;
        navigateToNode(node, graph);
      });

      return div;
    }

    boot();
  </script>
</body>
</html>
