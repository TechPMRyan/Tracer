<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tracer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    #graph {
      flex: 1;
      height: 100vh;
    }

    /* Detail panel */
    #panel {
      width: 300px;
      min-width: 300px;
      height: 100vh;
      background: #141414;
      border-left: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #panel-header {
      padding: 20px 16px 12px;
      border-bottom: 1px solid #2a2a2a;
    }

    #panel-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #555;
      margin-bottom: 8px;
    }

    #panel-name {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      word-break: break-all;
    }

    #panel-kind {
      margin-top: 4px;
      font-size: 11px;
      color: #555;
    }

    #panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .panel-section {
      margin-bottom: 20px;
    }

    .panel-section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #444;
      margin-bottom: 8px;
    }

    .panel-item {
      padding: 6px 8px;
      background: #1a1a1a;
      border-radius: 4px;
      margin-bottom: 4px;
      font-size: 12px;
      color: #ccc;
      cursor: pointer;
      border: 1px solid transparent;
      transition: border-color 0.1s;
    }

    .panel-item:hover { border-color: #333; }

    .panel-item .item-label {
      font-size: 10px;
      color: #555;
      margin-bottom: 2px;
    }

    #panel-empty {
      padding: 20px 16px;
      color: #444;
      font-size: 12px;
      line-height: 1.6;
    }

    /* Top bar */
    #topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 300px;
      height: 40px;
      background: rgba(13,13,13,0.9);
      border-bottom: 1px solid #1e1e1e;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 16px;
      z-index: 10;
      backdrop-filter: blur(4px);
    }

    #topbar-logo {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.05em;
    }

    #topbar-stats {
      font-size: 11px;
      color: #444;
    }

    #topbar-legend {
      display: flex;
      gap: 12px;
      margin-left: auto;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: #555;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #444;
      font-size: 13px;
    }

    #error {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #e05555;
      font-size: 13px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>

  <div id="topbar">
    <span id="topbar-logo">TRACER</span>
    <span id="topbar-stats"></span>
    <div id="topbar-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#4a9eff"></div>Controller</div>
      <div class="legend-item"><div class="legend-dot" style="background:#4ade80"></div>Service</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>Module</div>
      <div class="legend-item"><div class="legend-dot" style="background:#c084fc"></div>Model</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ef4444; border: 2px solid #ef4444"></div>Hotspot</div>
    </div>
  </div>

  <div id="graph"></div>

  <div id="panel">
    <div id="panel-header">
      <div id="panel-title">Node Inspector</div>
      <div id="panel-name" style="color:#444">Click a node to inspect</div>
      <div id="panel-kind"></div>
    </div>
    <div id="panel-body">
      <div id="panel-empty">
        Select any node in the graph to see its connections, routes, and source location.
      </div>
    </div>
  </div>

  <div id="loading">Loading graph...</div>
  <div id="error"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
  <script>
    const NODE_COLORS = {
      controller: '#4a9eff',
      service:    '#4ade80',
      module:     '#f59e0b',
      model:      '#c084fc',
    };

    const HOTSPOT_THRESHOLD = 5;

    async function boot() {
      try {
        const res = await fetch('/api/graph');
        if (!res.ok) throw new Error(await res.text());
        const graph = await res.json();
        renderGraph(graph);
      } catch (err) {
        document.getElementById('loading').style.display = 'none';
        const el = document.getElementById('error');
        el.style.display = 'block';
        el.innerHTML = `Could not load graph.<br><br>Run <strong>tracer scan</strong> first.`;
      }
    }

    function renderGraph(graph) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('topbar-stats').textContent =
        `${graph.nodes.length} nodes · ${graph.edges.length} edges`;

      const elements = [
        ...graph.nodes.map(n => ({
          data: {
            id: n.id,
            label: n.name,
            kind: n.kind,
            connectionCount: n.connectionCount,
            filePath: n.filePath,
            line: n.line,
          }
        })),
        ...graph.edges.map(e => ({
          data: {
            id: e.id,
            source: e.sourceId,
            target: e.targetId,
            label: e.label,
          }
        })),
      ];

      const cy = cytoscape({
        container: document.getElementById('graph'),
        elements,
        style: [
          {
            selector: 'node',
            style: {
              'background-color': (ele) => {
                if (ele.data('connectionCount') >= HOTSPOT_THRESHOLD) return '#ef4444';
                return NODE_COLORS[ele.data('kind')] || '#888';
              },
              'label': 'data(label)',
              'color': '#fff',
              'font-size': '11px',
              'font-family': "'SF Mono', 'Fira Code', monospace",
              'text-valign': 'bottom',
              'text-margin-y': '6px',
              'text-outline-width': 2,
              'text-outline-color': '#0d0d0d',
              'width': (ele) => Math.max(24, 12 + ele.data('connectionCount') * 4),
              'height': (ele) => Math.max(24, 12 + ele.data('connectionCount') * 4),
              'border-width': (ele) => ele.data('connectionCount') >= HOTSPOT_THRESHOLD ? 2 : 0,
              'border-color': '#ef4444',
            }
          },
          {
            selector: 'node:selected',
            style: {
              'border-width': 2,
              'border-color': '#fff',
            }
          },
          {
            selector: 'edge',
            style: {
              'width': 1,
              'line-color': '#2a2a2a',
              'target-arrow-color': '#2a2a2a',
              'target-arrow-shape': 'triangle',
              'curve-style': 'bezier',
              'opacity': 0.8,
            }
          },
          {
            selector: 'edge:selected',
            style: {
              'line-color': '#555',
              'target-arrow-color': '#555',
              'opacity': 1,
            }
          },
          {
            selector: '.highlighted',
            style: {
              'line-color': '#4a9eff',
              'target-arrow-color': '#4a9eff',
              'opacity': 1,
            }
          },
          {
            selector: '.faded',
            style: { 'opacity': 0.15 }
          },
        ],
        layout: {
          name: 'cose',
          padding: 60,
          nodeRepulsion: 8000,
          idealEdgeLength: 100,
          animate: false,
        }
      });

      cy.on('tap', 'node', (evt) => {
        const node = evt.target;
        showPanel(node.data(), graph);
        highlightConnections(cy, node);
      });

      cy.on('tap', (evt) => {
        if (evt.target === cy) {
          resetPanel();
          cy.elements().removeClass('highlighted faded');
        }
      });
    }

    function highlightConnections(cy, node) {
      cy.elements().removeClass('highlighted faded');
      const connected = node.connectedEdges();
      const neighbors = node.neighborhood();
      cy.elements().not(neighbors).not(node).addClass('faded');
      connected.addClass('highlighted');
    }

    function showPanel(data, graph) {
      document.getElementById('panel-empty').style.display = 'none';
      document.getElementById('panel-name').textContent = data.label;
      document.getElementById('panel-name').style.color = NODE_COLORS[data.kind] || '#fff';
      document.getElementById('panel-kind').textContent =
        `${data.kind}  ·  ${data.connectionCount} connection${data.connectionCount !== 1 ? 's' : ''}`;

      const body = document.getElementById('panel-body');
      body.innerHTML = '';

      // Source location
      const sourceSection = section('Source');
      const fileItem = item(data.filePath.split(/[\\/]/).pop(), `Line ${data.line}`);
      fileItem.title = data.filePath;
      sourceSection.appendChild(fileItem);
      body.appendChild(sourceSection);

      // Routes (controllers only)
      const nodeData = graph.nodes.find(n => n.id === data.id);
      const edges = graph.edges.filter(
        e => e.sourceId === data.id || e.targetId === data.id
      );

      const outbound = edges.filter(e => e.sourceId === data.id);
      const inbound = edges.filter(e => e.targetId === data.id);

      if (outbound.length) {
        const s = section('Calls');
        for (const edge of outbound) {
          const target = graph.nodes.find(n => n.id === edge.targetId);
          if (target) s.appendChild(item(target.name, edge.label));
        }
        body.appendChild(s);
      }

      if (inbound.length) {
        const s = section('Called by');
        for (const edge of inbound) {
          const source = graph.nodes.find(n => n.id === edge.sourceId);
          if (source) s.appendChild(item(source.name, edge.label));
        }
        body.appendChild(s);
      }

      if (data.connectionCount >= HOTSPOT_THRESHOLD) {
        const s = section('Warning');
        const w = document.createElement('div');
        w.style.cssText = 'padding:8px;background:#1f1010;border-radius:4px;color:#ef4444;font-size:12px;line-height:1.5;border:1px solid #3a1515';
        w.textContent = `Hotspot: ${data.connectionCount} connections. High coupling — changes here have wide impact.`;
        s.appendChild(w);
        body.appendChild(s);
      }
    }

    function resetPanel() {
      document.getElementById('panel-name').textContent = 'Click a node to inspect';
      document.getElementById('panel-name').style.color = '#444';
      document.getElementById('panel-kind').textContent = '';
      const body = document.getElementById('panel-body');
      body.innerHTML = '<div id="panel-empty" style="padding:20px 0;color:#444;font-size:12px;line-height:1.6">Select any node in the graph to see its connections, routes, and source location.</div>';
    }

    function section(title) {
      const div = document.createElement('div');
      div.className = 'panel-section';
      const label = document.createElement('div');
      label.className = 'panel-section-label';
      label.textContent = title;
      div.appendChild(label);
      return div;
    }

    function item(name, sublabel) {
      const div = document.createElement('div');
      div.className = 'panel-item';
      if (sublabel) {
        const sub = document.createElement('div');
        sub.className = 'item-label';
        sub.textContent = sublabel;
        div.appendChild(sub);
      }
      const text = document.createElement('div');
      text.textContent = name;
      div.appendChild(text);
      return div;
    }

    boot();
  </script>
</body>
</html>
